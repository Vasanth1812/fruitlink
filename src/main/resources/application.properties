# ──────────────────────────────────────────────
# Application
# ──────────────────────────────────────────────
spring.application.name=fruitlink-backend

# ──────────────────────────────────────────────
# Virtual Threads (Java 21 + Spring Boot 3.2+)
# ──────────────────────────────────────────────
spring.threads.virtual.enabled=true

# ──────────────────────────────────────────────
# Disable unused services for now (Phase 2: after demo)
# Comment this line out when Redis / RabbitMQ / Quartz are ready
# ──────────────────────────────────────────────
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,\
  org.springframework.boot.autoconfigure.quartz.QuartzAutoConfiguration

# ──────────────────────────────────────────────
# DataSource (PostgreSQL)
# ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/fruitlink_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# ──────────────────────────────────────────────
# JPA / Hibernate
# ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ──────────────────────────────────────────────
# Flyway
# ──────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ──────────────────────────────────────────────
# Cache - using simple in-memory cache (Phase 2: switch to Redis)
# ──────────────────────────────────────────────
spring.cache.type=simple

