# ──────────────────────────────────────────────
# Server
# ──────────────────────────────────────────────
server.port=8080
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/plain
server.error.include-message=always
server.error.include-binding-errors=always

# ──────────────────────────────────────────────
# JWT
# ──────────────────────────────────────────────
app.jwt.secret=${JWT_SECRET:fruitlink-super-secret-key-must-be-at-least-256-bits-long-for-HS256}
app.jwt.access-token-expiration-ms=86400000
app.jwt.refresh-token-expiration-ms=604800000

# ──────────────────────────────────────────────
# AWS S3 (Phase 2 - set real credentials after demo)
# ──────────────────────────────────────────────
app.aws.region=${AWS_REGION:ap-south-1}
app.aws.s3.bucket-name=${S3_BUCKET_NAME:fruitlink-uploads}
app.aws.s3.presigned-url-expiry-minutes=60
app.aws.access-key=${AWS_ACCESS_KEY_ID:}
app.aws.secret-key=${AWS_SECRET_ACCESS_KEY:}

# ──────────────────────────────────────────────
# RabbitMQ Exchange / Queue Names (Phase 2)
# ──────────────────────────────────────────────
app.rabbitmq.exchange=fruitlink.exchange
app.rabbitmq.queues.notifications=fruitlink.notifications
app.rabbitmq.queues.purchase-orders=fruitlink.purchase-orders
app.rabbitmq.queues.delivery-events=fruitlink.delivery-events

# ──────────────────────────────────────────────
# Springdoc / Swagger UI
# ──────────────────────────────────────────────
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.display-request-duration=true

# ──────────────────────────────────────────────
# Actuator
# ──────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.export.prometheus.enabled=true

# ──────────────────────────────────────────────
# Sentry (Phase 2 - set real DSN after demo)
# ──────────────────────────────────────────────
sentry.dsn=${SENTRY_DSN:}
sentry.traces-sample-rate=0.2
sentry.environment=${SPRING_PROFILES_ACTIVE:local}

# ──────────────────────────────────────────────
# Logging
# ──────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.fruitlink=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.tooling=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ──────────────────────────────────────────────
# Mail Configuration (OTP)
# ──────────────────────────────────────────────
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
